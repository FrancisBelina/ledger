<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#080A0B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Ledger">
    <title>Ledger</title>
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=10">
    <link rel="manifest" href="manifest.json?v=10">
    <link rel="stylesheet" href="styles.css?v=9">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p id="periodLabel" class="eyebrow">Sample</p>
        <h1>Ledger</h1>
      </div>
      <button id="refreshButton" class="icon-button" type="button" aria-label="Refresh dashboard">Refresh</button>
    </header>

    <main id="appShell">
      <section id="homePanel" class="view" data-view="home"></section>
      <section id="netWorthPanel" class="view" data-view="networth" hidden></section>
      <section id="cashflowPanel" class="view" data-view="cashflow" hidden></section>
      <section id="projectionPanel" class="view" data-view="projection" hidden></section>
      <section id="comparePanel" class="view" data-view="compare" hidden></section>
      <section id="sheetPanel" class="view" data-view="sheet" hidden></section>
    </main>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-button active" type="button" data-tab="home">Home</button>
      <button class="nav-button" type="button" data-tab="networth">Net worth</button>
      <button class="nav-button" type="button" data-tab="cashflow">Cashflow</button>
      <button class="nav-button" type="button" data-tab="projection">Project</button>
      <button class="nav-button" type="button" data-tab="compare">Compare</button>
      <button class="nav-button" type="button" data-tab="sheet">Inputs</button>
    </nav>

    <script src="data/sample-data.js?v=15"></script>
    <script src="app.js?v=15"></script>
  </body>
</html>
